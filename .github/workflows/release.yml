name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create virtual environment
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          .\.venv\Scripts\python.exe -m pip install -r requirements-dev.txt

      - name: Build PyInstaller executable
        run: |
          .\.venv\Scripts\python.exe -m PyInstaller --noconfirm --clean --onefile --windowed --name "f1-telemetry-overlay" --icon "fto-icon.ico" --add-data "fto-icon.ico;." main.py

      - name: Copy icon to dist
        run: copy fto-icon.ico "dist\fto-icon.ico"

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-telemetry-overlay
          path: |
            dist/f1-telemetry-overlay.exe
            dist/fto-icon.ico

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: f1-telemetry-overlay
          path: dist/

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_STRIPPED=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Create Release with gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          VERSION_STRIPPED: ${{ steps.version.outputs.VERSION_STRIPPED }}
        run: |
          gh release create "$VERSION" \
            --title "F1 Telemetry Overlay $VERSION_STRIPPED" \
            --generate-notes \
            dist/f1-telemetry-overlay.exe \
            dist/fto-icon.ico

  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: [build, create-release]
    if: github.event.inputs.version != '' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: f1-telemetry-overlay
          path: dist/

      - name: Find Inno Setup
        id: iscc
        run: |
          $paths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              echo "path=$p" >> $env:GITHUB_OUTPUT
              echo "found=true" >> $env:GITHUB_OUTPUT
              exit 0
            }
          }
          echo "found=false" >> $env:GITHUB_OUTPUT
          echo "path=" >> $env:GITHUB_OUTPUT

      - name: Build installer
        if: steps.iscc.outputs.found == 'true'
        run: |
          & "${{ steps.iscc.outputs.path }}" f1-telemetry-overlay.iss

      - name: Upload installer to release
        if: steps.iscc.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version || github.ref }}
        run: |
          gh release upload "$VERSION" dist/installer/*.exe --clobber
